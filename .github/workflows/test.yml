on:
  push:
    branches:
      - feat/fusion-framework/app-alpha

jobs:
  test:
    name: Test the app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/publish.yml
        with:
          working_directory: 'apps/demo-app'
          tag: 'preview'