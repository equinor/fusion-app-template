name: ci

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release-pkg:
    name: Version or publish packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch all history for changesets to work
          fetch-depth: 0

      - name: Configure git user (trigger actor) 
        uses: ./.github/workflows/actions/config-git-user
      
      - name: Setup node and install deps
        uses: ./.github/workflows/actions/node-setup

      # TODO - Add your build and deploy steps here
      - name: Create Release
        id: changesets
        uses: changesets/action@v1
        with:
          title: '🤖 Bip Bop - My Apps Release'
          createGithubReleases: true
          setupGitUser: false
          # This will create a pull request with the changeset content
          version: pnpm changeset:version
          # This will create a Github release with the changeset content
          publish: pnpm changeset:publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      # new changes, put release back to draft
      - name: convert Changeset PR to draf
        if: steps.changesets.outputs.published == 'false' && steps.changesets.outputs.pullRequestNumber
        run: gh pr ready ${{ steps.changesets.outputs.pullRequestNumber }} --undo
        env:
          GH_TOKEN: ${{ github.token }}



