name: AppsService Publish - CI

on:
  push:
    branches:
      - feat/fusion-framework/app-alpha
#       - main @TODO

env:
  WORKING_DIRECTORY: ./packages/demo-app

permissions:
  id-token: write
  contents: read

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    name: Build the app and upload artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup node and install deps
        uses: ./.github/workflows/actions/node-setup

      - name: Build version
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: pnpm exec fusion-framework-cli app build-pack

      - name: Upload packed app as artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: |
            ${{ env.WORKING_DIRECTORY }}/app-bundle.zip
            ${{ env.WORKING_DIRECTORY }}/dist/app-manifest.json

  upload:
    needs: build
    name: Publish to apps-service
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        environment: ['CI']
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup node and install deps
        uses: ./.github/workflows/actions/node-setup

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-bundle
          path: ${{ env.WORKING_DIRECTORY }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Azure CLI
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "FUSION_TOKEN=$(az account get-access-token --scope ${{ vars.APP_PUBLISH_SCOPE }} --query accessToken --output tsv)" >> $GITHUB_ENV

      - name: Save version to variable
        id: app_version
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          echo "APP_VERSION=$(cat ./dist/app-manifest.json | jq -r .version)" >> $GITHUB_OUTPUT

      - name: Publish current version to apps-service
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          pnpm exec fusion-framework-cli app build-upload --env $ENVIRONMENT -b app-bundle.zip
          pnpm exec fusion-framework-cli app build-tag --env $ENVIRONMENT --tag $TAG --version $VERSION
        env:
          VERSION: ${{ steps.app_version.outputs.APP_VERSION }}
          TAG: preview
          ENVIRONMENT: ${{ matrix.environment }}

      - name: Upload config for this version and env
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: pnpm exec fusion-framework-cli app build-config --config app.config-$ENVIRONMENT.ts --publish $VERSION --env $ENVIRONMENT
        env:
          VERSION: ${{ steps.app_version.outputs.APP_VERSION }}
          ENVIRONMENT: ${{ matrix.environment }}
